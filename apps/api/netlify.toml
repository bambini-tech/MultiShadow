# Netlify configuration for the MultiShadow proxy.
# Set HOUDINI_API_KEY, HOUDINI_BASE_URL, SOLANA_RPC_URL, ALLOWED_ORIGINS as
# environment variables in the Netlify dashboard — never commit them.
#
# Functions live in netlify/functions and self-declare their routes via
# `export const config = { path: "/api/..." }` (Netlify Functions v2).

[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
