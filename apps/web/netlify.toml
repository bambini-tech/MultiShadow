# Netlify configuration for the MultiShadow frontend (static SPA).
# Set VITE_REOWN_PROJECT_ID, VITE_API_BASE_URL, VITE_SOLANA_RPC_URL as build
# environment variables in the Netlify dashboard.

[build]
  base = "apps/web"
  command = "pnpm --filter @multishadow/web build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
